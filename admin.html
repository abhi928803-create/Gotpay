<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GotPay - Professional Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0056D2; --secondary: #003b8e; --bg: #f4f7f6; --text: #333; --success: #4caf50; --danger: #e53935; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        
        .admin-container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; margin-bottom: 20px; }
        .logo { font-size: 26px; color: var(--primary); font-weight: 900; }
        .logo span { color: #ff9800; }
        
        .section-title { font-size: 18px; color: var(--primary); margin: 20px 0 10px 0; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: white; font-size: 13px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; color: #555; font-weight: bold; }
        
        .btn-approve { background: var(--success); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-reject { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; margin-left: 5px; }
        
        .badge-pending { background: #fff3e0; color: #ff9800; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .badge-success { background: #e8f5e9; color: var(--success); padding: 3px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header">
            <h1 class="logo">Got<span>Pay</span> Admin</h1>
            <span style="font-size: 13px; color: #666; font-weight: bold;"><i class="fa-solid fa-shield-halved" style="color:var(--primary);"></i> Secure Portal</span>
        </div>

        <!-- 1. PENDING DEPOSIT REQUESTS -->
        <div class="section-title"><i class="fa-solid fa-arrow-down-to-bracket"></i> Pending Deposit Requests (QR / UTR)</div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>User / Phone</th>
                        <th>Amount</th>
                        <th>Gateway</th>
                        <th>UTR No</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminDepositTable">
                    <tr><td colspan="6" style="text-align:center; color:#888;">Loading deposits...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 2. PENDING ORDER CLAIM PAYMENTS -->
        <div class="section-title" style="margin-top: 30px;"><i class="fa-solid fa-file-invoice-dollar"></i> Pending Order UTR Approvals</div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>User / Phone</th>
                        <th>Order Amt</th>
                        <th>Platform</th>
                        <th>UTR Number</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminOrderTable">
                    <tr><td colspan="6" style="text-align:center; color:#888;">Loading orders...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- FIREBASE SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDo8GjgCQ5EGdNH7I8pbRnnxahcpmfwexs",
            authDomain: "gotpay-3cfe1.firebaseapp.com",
            databaseURL: "https://gotpay-3cfe1-default-rtdb.firebaseio.com",
            projectId: "gotpay-3cfe1",
            storageBucket: "gotpay-3cfe1.firebasestorage.app",
            messagingSenderId: "62334887647",
            appId: "1:62334887647:web:d5b389eb34c100b6812b6a",
            measurementId: "G-EBJBBFRSV7"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. LOAD DEPOSIT REQUESTS
        db.ref('deposit_requests').on('value', (snapshot) => {
            let tbody = document.getElementById('adminDepositTable');
            tbody.innerHTML = '';
            let data = snapshot.val();
            
            if(!data) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#888;">No deposit requests found.</td></tr>`;
                return;
            }

            Object.keys(data).forEach(key => {
                let req = data[key];
                if(req.status === 'Pending') {
                    tbody.innerHTML += `
                        <tr>
                            <td><b>${req.username || 'User'}</b><br><span style="color:#777; font-size:11px;">${req.phone}</span></td>
                            <td style="color:var(--success); font-weight:bold;">₹${req.amount_with_bonus || req.original_amount}</td>
                            <td>${req.gateway}</td>
                            <td><b>${req.utr}</b></td>
                            <td><span class="badge-pending">Pending</span></td>
                            <td>
                                <button class="btn-approve" onclick="approveDeposit('${key}', '${req.phone}', ${req.amount_with_bonus || req.original_amount})">Approve</button>
                                <button class="btn-reject" onclick="rejectDeposit('${key}')">Reject</button>
                            </td>
                        </tr>
                    `;
                }
            });
        });

        // APPROVE DEPOSIT & ADD BALANCE TO USER
        window.approveDeposit = async (reqKey, userPhone, totalAmount) => {
            if(!confirm("Approve this deposit and add balance to user?")) return;
            try {
                let userRef = db.ref('users/' + userPhone);
                let snap = await userRef.once('value');
                let currentBal = snap.exists() ? (Number(snap.val().balance) || 0) : 0;
                
                // Balance update karein
                await userRef.update({ balance: currentBal + Number(totalAmount) });
                // Request status Success karein
                await db.ref('deposit_requests/' + reqKey).update({ status: 'Success' });
                
                alert("✅ Deposit Approved Successfully!");
            } catch(e) {
                alert("Error: " + e.message);
            }
        };

        window.rejectDeposit = async (reqKey) => {
            if(!confirm("Reject this deposit request?")) return;
            await db.ref('deposit_requests/' + reqKey).update({ status: 'Rejected' });
            alert("❌ Deposit Rejected.");
        };


        // 2. LOAD ORDER PAYMENTS PENDING
        db.ref('order_payments_pending').on('value', (snapshot) => {
            let tbody = document.getElementById('adminOrderTable');
            tbody.innerHTML = '';
            let data = snapshot.val();
            
            if(!data) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#888;">No pending order approvals.</td></tr>`;
                return;
            }

            Object.keys(data).forEach(key => {
                let req = data[key];
                if(req.status === 'Pending') {
                    tbody.innerHTML += `
                        <tr>
                            <td><b>${req.username || 'User'}</b><br><span style="color:#777; font-size:11px;">${req.phone}</span></td>
                            <td style="color:var(--primary); font-weight:bold;">₹${req.order_amount}</td>
                            <td>${req.platform}</td>
                            <td><b>${req.utr}</b></td>
                            <td><span class="badge-pending">Pending</span></td>
                            <td>
                                <button class="btn-approve" onclick="approveOrder('${key}', '${req.phone}', ${req.order_amount}, ${req.commission || 0})">Approve</button>
                                <button class="btn-reject" onclick="rejectOrder('${key}')">Reject</button>
                            </td>
                        </tr>
                    `;
                }
            });
        });

        // APPROVE ORDER & ADD COMMISSION / BALANCE
        window.approveOrder = async (reqKey, userPhone, orderAmt, commissionAmt) => {
            if(!confirm("Approve this order payment?")) return;
            try {
                let userRef = db.ref('users/' + userPhone);
                let snap = await userRef.once('value');
                let userData = snap.exists() ? snap.val() : {};
                
                let currentBal = Number(userData.balance) || 0;
                let currentComm = Number(userData.commission) || 0;
                
                // User ka balance aur commission update karein
                await userRef.update({ 
                    balance: currentBal + Number(orderAmt),
                    commission: currentComm + Number(commissionAmt)
                });

                // Status Approved karein
                await db.ref('order_payments_pending/' + reqKey).update({ status: 'Approved' });
                
                alert("✅ Order Approved Successfully!");
            } catch(e) {
                alert("Error: " + e.message);
            }
        };

        window.rejectOrder = async (reqKey) => {
            if(!confirm("Reject this order payment?")) return;
            await db.ref('order_payments_pending/' + reqKey).update({ status: 'Rejected' });
            alert("❌ Order Rejected.");
        };
    </script>
</body>
</html>
