<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GotPay - Professional Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0056D2; --bg: #f4f7f6; --success: #4caf50; --danger: #e53935; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: #333; padding: 20px; }
        .admin-container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: var(--primary); margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .request-card { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 10px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .req-info p { font-size: 14px; margin-bottom: 4px; color: #555; }
        .req-info p strong { color: #111; }
        .utr-highlight { background: #e3f2fd; color: var(--primary); padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .action-btns { display: flex; gap: 10px; }
        .btn-approve { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-reject { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .no-data { text-align: center; color: #888; padding: 30px; font-size: 15px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2><i class="fa-solid fa-shield-halved"></i> GotPay Admin Control Panel</h2>
        <p style="margin-bottom: 20px; font-size: 13px; color: #666;">Verify user UTR and approve payments safely to update their wallet balance automatically.</p>
        
        <h3>Pending Payment Approvals</h3>
        <div id="adminPendingList" style="margin-top: 15px;">
            <div class="no-data">Loading pending requests...</div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDo8GjgCQ5EGdNH7I8pbRnnxahcpmfwexs",
            authDomain: "gotpay-3cfe1.firebaseapp.com",
            databaseURL: "https://gotpay-3cfe1-default-rtdb.firebaseio.com",
            projectId: "gotpay-3cfe1",
            storageBucket: "gotpay-3cfe1.firebasestorage.app",
            messagingSenderId: "62334887647",
            appId: "1:62334887647:web:d5b389eb34c100b6812b6a",
            measurementId: "G-EBJBBFRSV7"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- FETCH PENDING REQUESTS ---
        const pendingRef = db.ref('order_payments_pending');
        pendingRef.on('value', (snapshot) => {
            let container = document.getElementById('adminPendingList');
            container.innerHTML = '';
            
            let data = snapshot.val();
            if (!data) {
                container.innerHTML = '<div class="no-data">No pending payment requests right now.</div>';
                return;
            }
            
            Object.keys(data).forEach((key) => {
                let req = data[key];
                
                // Sirf 'Pending' status wale dikhayen
                if(req.status === "Pending") {
                    let card = document.createElement('div');
                    card.className = 'request-card';
                    card.innerHTML = `
                        <div class="req-info">
                            <p><strong>User:</strong> ${req.username} (Ph: ${req.phone})</p>
                            <p><strong>User ID:</strong> ${req.uid}</p>
                            <p><strong>Amount:</strong> ₹${req.order_amount} | <strong>Commission:</strong> ₹${req.commission}</p>
                            <p><strong>Platform:</strong> ${req.platform}</p>
                            <p><strong>UTR / Ref No:</strong> <span class="utr-highlight">${req.utr}</span></p>
                            <p style="font-size: 11px; color: #999; margin-top: 4px;">Time: ${new Date(req.timestamp).toLocaleString()}</p>
                        </div>
                        <div class="action-btns">
                            <button class="btn-approve" onclick="approvePayment('${key}', '${req.phone}', ${req.order_amount}, ${req.commission})">Approve</button>
                            <button class="btn-reject" onclick="rejectPayment('${key}')">Reject</button>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
        });

        // --- APPROVE PAYMENT (Adds Balance to User Wallet) ---
        window.approvePayment = async function(firebaseKey, userPhone, orderAmt, commissionAmt) {
            if(!confirm("Are you sure you want to APPROVE this payment? Balance will be added to the user.")) return;

            try {
                let userRef = db.ref('users/' + userPhone);
                let userSnap = await userRef.once('value');
                
                if(!userSnap.exists()) {
                    alert("Error: User account not found in database!");
                    return;
                }

                let userData = userSnap.val();
                let currentBal = Number(userData.balance) || 0;
                let currentComm = Number(userData.commission) || 0;

                let newBal = currentBal + orderAmt + commissionAmt;
                let newComm = currentComm + commissionAmt;

                // 1. User ke account mein balance aur commission update karein
                await userRef.update({
                    balance: newBal,
                    commission: newComm
                });

                // 2. Pending request ka status 'Approved' kar dein taaki list se hat jaye
                await db.ref('order_payments_pending/' + firebaseKey).update({
                    status: "Approved"
                });

                alert("✅ Payment Approved Successfully! User balance updated.");
            } catch(err) {
                alert("Error: " + err.message);
            }
        };

        // --- REJECT PAYMENT ---
        window.rejectPayment = async function(firebaseKey) {
            if(!confirm("Are you sure you want to REJECT this payment?")) return;

            try {
                await db.ref('order_payments_pending/' + firebaseKey).update({
                    status: "Rejected"
                });
                alert("❌ Payment Request Rejected.");
            } catch(err) {
                alert("Error: " + err.message);
            }
        };
    </script>
</body>
</html>
